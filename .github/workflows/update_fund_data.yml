name: Update Fund Data

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'data/**'
  pull_request:
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install xalpha pandas
      - name: Fetch fund data
        run: python scripts/fetch_fund_data.py
      - name: Commit and push (skip if on PR)
        if: github.event_name != 'pull_request'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update fund data"
          git push || true
          git pull --rebase || true
      - name: Prepare static files
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets _site/
          cp -r config _site/
          cp -r data _site/
          touch _site/.nojekyll
      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
      - name: Retry deployment on failure
        if: github.event_name != 'pull_request' && failure()
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
